<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraEMS - Password Reset Request</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #090b11;
            --card-bg: rgba(17, 22, 34, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(59, 130, 246, 0.15);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--primary-bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.18) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            min-height: 100vh;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            color: #f8fafc !important;
            border-radius: 12px !important;
            padding: 10px 14px !important;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.05) !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25) !important;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6) !important;
            border: none !important;
            border-radius: 12px !important;
            padding: 12px !important;
            font-weight: 600 !important;
        }
    </style>
</head>
<body>

<div class="glass-card text-center">
    <div class="mb-4">
        <i class="fa-solid fa-key fs-1 text-info mb-3"></i>
        <h3 class="fw-bold text-white">Reset Password</h3>
        <p class="text-secondary small">Enter your email and we'll send you instructions to reset your password.</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-4 text-start">
            <label class="form-label text-secondary small fw-semibold">Email Address</label>
            <input type="email" name="email" class="form-control glass-input" placeholder="name@company.com" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
    </form>

    <div class="mt-4 text-center">
        <a href="{% url 'login' %}" class="text-decoration-none small text-secondary hover-white"><i class="fa-solid fa-arrow-left me-1"></i> Back to Login</a>
    </div>
</div>

</body>
</html>
