<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraEMS - Reset Link Sent</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #090b11;
            --card-bg: rgba(17, 22, 34, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--primary-bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.18) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            min-height: 100vh;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
        }
    </style>
</head>
<body>

<div class="glass-card text-center">
    <div class="mb-4">
        <i class="fa-solid fa-envelope-circle-check fs-1 text-success mb-3"></i>
        <h3 class="fw-bold text-white">Email Sent</h3>
        <p class="text-secondary small">We've emailed you instructions for setting your password, if an account exists with the email you entered. You should receive them shortly.</p>
    </div>

    <p class="text-secondary small">If you don't receive an email, please make sure you've entered the address you registered with, and check your spam folder.</p>

    <div class="mt-4 text-center border-top pt-3 border-secondary border-opacity-10">
        <a href="{% url 'login' %}" class="text-decoration-none small text-secondary hover-white">Return to Login</a>
    </div>
</div>

</body>
</html>
